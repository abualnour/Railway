services:
  - type: web
    name: 3teek-hr
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "127.0.0.1,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: 3teek-hr-db
          property: connectionString

databases:
  - name: 3teek-hr-db
