{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">{{ page_title }}</h1>
        <p class="page-subtitle">Please confirm this delete action.</p>
    </div>
</div>

<div class="card delete-confirm-card">
    <div class="confirm-delete">
        <h3 class="delete-confirm-title">Are you sure you want to delete <strong>{{ object }}</strong>?</h3>
        <p class="text-muted">This action cannot be undone.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{{ cancel_url }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
