{% extends "base.html" %}

{% block title %}Delete Candidate{% endblock %}

{% block content %}
<div class="page-section">
    <form method="post" class="card" style="padding:24px;">
        {% csrf_token %}
        <h1 style="margin-top:0;">Delete Candidate</h1>
        <p>Delete <strong>{{ object.full_name }}</strong> from <strong>{{ object.job_posting.title }}</strong>?</p>
        <div class="page-actions" style="margin-top:20px;">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a class="btn btn-light" href="{% url 'recruitment:candidate_detail' object.pk %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
