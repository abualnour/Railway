{% extends "base.html" %}

{% block title %}Delete Job Posting{% endblock %}

{% block content %}
<div class="page-section">
    <form method="post" class="card" style="padding:24px;">
        {% csrf_token %}
        <h1 style="margin-top:0;">Delete Job Posting</h1>
        <p>Delete <strong>{{ object.title }}</strong>? This will also remove linked candidate records.</p>
        <div class="page-actions" style="margin-top:20px;">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a class="btn btn-light" href="{% url 'recruitment:job_posting_detail' object.pk %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
